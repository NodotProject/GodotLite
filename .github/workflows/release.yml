name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build templates (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: ubuntu-latest
            platform: windows
          - os: macos-15
            platform: macos
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_REF }}

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            git \
            pkg-config \
            python3 \
            scons \
            zip \
            mingw-w64 \
            libx11-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxi-dev \
            libasound2-dev \
            libpulse-dev \
            libudev-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev

      - name: Configure mingw (POSIX threads)
        if: runner.os == 'Linux' && matrix.platform == 'windows'
        run: |
          set -euo pipefail
          if update-alternatives --list x86_64-w64-mingw32-g++ >/dev/null 2>&1; then
            sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix || true
            sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix || true
          fi

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          brew update
          brew install scons pkg-config

      - name: Build templates
        run: |
          set -euo pipefail
          ./build.sh "${{ matrix.platform }}"

      - name: Package artifacts
        run: |
          set -euo pipefail
          mkdir -p dist

          case "${{ matrix.platform }}" in
            linux)
              file="godot/bin/godot.linuxbsd.template_release.x86_64"
              out="godotlite-${RELEASE_TAG}-linux-x86_64"
              ;;
            windows)
              file="godot/bin/godot.windows.template_release.x86_64.exe"
              out="godotlite-${RELEASE_TAG}-windows-x86_64.exe"
              ;;
            macos)
              file="godot/bin/godot.macos.template_release.universal"
              out="godotlite-${RELEASE_TAG}-macos-universal"
              ;;
            *)
              echo "Unknown platform: ${{ matrix.platform }}"
              exit 1
              ;;
          esac

          if [[ ! -f "${file}" ]]; then
            echo "Expected output not found: ${file}"
            exit 1
          fi

          cp "${file}" "dist/${out}"
          (cd dist && zip -9 "templates-${RELEASE_TAG}-${{ matrix.platform }}.zip" "${out}")

          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "templates-${RELEASE_TAG}-${{ matrix.platform }}.zip" > "templates-${RELEASE_TAG}-${{ matrix.platform }}.zip.sha256")
          else
            (cd dist && shasum -a 256 "templates-${RELEASE_TAG}-${{ matrix.platform }}.zip" > "templates-${RELEASE_TAG}-${{ matrix.platform }}.zip.sha256")
          fi

          ls -lh dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: templates-${{ matrix.platform }}
          path: dist/*

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_REF }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Build source archives
        run: |
          set -euo pipefail

          git fetch --tags --force

          if ! git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            echo "Tag not found: ${RELEASE_TAG}"
            exit 1
          fi

          mkdir -p dist
          prefix="godotlite-${RELEASE_TAG}/"

          git archive --format=tar.gz --prefix="${prefix}" -o "dist/godotlite-${RELEASE_TAG}.tar.gz" "refs/tags/${RELEASE_TAG}"
          git archive --format=zip --prefix="${prefix}" -o "dist/godotlite-${RELEASE_TAG}.zip" "refs/tags/${RELEASE_TAG}"

          ls -lh dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            dist/**
